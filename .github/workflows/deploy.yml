name: Build and Deploy to Azure

on:
  push:
    branches: [ main, staging ]
  workflow_dispatch:

env:
  REGISTRY: rudyimhtpdev
  BACKEND_IMAGE: piemonte_region

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "image_tag=staging" >> $GITHUB_OUTPUT
            echo "vm_host=20.19.88.192" >> $GITHUB_OUTPUT
            echo "vm_user=azureuser" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.staging.yml" >> $GITHUB_OUTPUT
            echo "domain=piemonte-staging.francecentral.cloudapp.azure.com" >> $GITHUB_OUTPUT
            echo "ssh_key_secret=AZURE_SSH_KEY_STAGING" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "vm_host=20.19.89.99" >> $GITHUB_OUTPUT
            echo "vm_user=azureuser" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.yml" >> $GITHUB_OUTPUT
            echo "domain=piemonte.francecentral.cloudapp.azure.com" >> $GITHUB_OUTPUT
            echo "ssh_key_secret=AZURE_SSH_KEY" >> $GITHUB_OUTPUT
          fi

      - name: Detect Changes & Generate Version
        id: meta
        run: |
          echo "version=v$(date +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

          if git diff --name-only HEAD^ HEAD 2>/dev/null | grep -E '^(info_agent|config|flows|models|pipeline|services|serializers|utils|data|bot\.py|chat_service\.py|requirements\.txt|Dockerfile|docker-compose|nginx)'; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "✅ Backend changed"
          else
            echo "backend=false" >> $GITHUB_OUTPUT
            echo "⏭️ Backend unchanged"
          fi

      - name: Set up Docker Buildx
        if: steps.meta.outputs.backend == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.meta.outputs.backend == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        if: steps.meta.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.env.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure VM (${{ steps.env.outputs.environment }})
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.env.outputs.vm_host }}
          username: ${{ steps.env.outputs.vm_user }}
          key: ${{ github.ref == 'refs/heads/staging' && secrets.AZURE_SSH_KEY_STAGING || secrets.AZURE_SSH_KEY }}
          script: |
            cd /home/azureuser/voilavoiceagent

            echo "🚀 Deploying to ${{ steps.env.outputs.environment }} (${{ steps.env.outputs.vm_host }})"

            # Pull latest code
            echo "📥 Pulling latest code..."
            OLD_COMMIT=$(git rev-parse HEAD)
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "Updated from $OLD_COMMIT to $NEW_COMMIT"

            # Check if config files changed
            CONFIG_CHANGED=0
            if [ "$OLD_COMMIT" != "$NEW_COMMIT" ]; then
              if git diff $OLD_COMMIT $NEW_COMMIT --name-only | grep -E '(nginx|docker-compose)'; then
                echo "📝 Config files changed"
                CONFIG_CHANGED=1
              fi
            fi

            # Login to Docker Hub
            echo "🔐 Logging in to Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Disk cleanup
            echo "💾 Checking disk space..."
            df -h /
            AVAILABLE=$(df / | tail -1 | awk '{print $4}' | sed 's/G//')
            if [ $(echo "$AVAILABLE < 10" | bc) -eq 1 ]; then
              echo "⚠️ Low disk space! Cleaning up..."
              docker stop buildx_buildkit_mybuilder0 2>/dev/null || true
              docker rm buildx_buildkit_mybuilder0 2>/dev/null || true
              docker volume rm buildx_buildkit_mybuilder0_state 2>/dev/null || true
              docker image prune -a -f --filter "until=72h"
              df -h /
            else
              docker image prune -a -f --filter "until=168h"
            fi

            # Pull latest image
            echo "📦 Pulling latest image..."
            MAX_RETRIES=3
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if docker pull ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.env.outputs.image_tag }}; then
                echo "✅ Image pulled successfully"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "⚠️ Pull failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
                  sleep 5
                else
                  echo "❌ Pull failed after $MAX_RETRIES attempts"
                  exit 1
                fi
              fi
            done

            # Backup current image
            echo "💾 Creating backup..."
            docker tag $(docker inspect --format='{{.Image}}' pipecat-agent-1 2>/dev/null || echo "none") ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:backup 2>/dev/null || true

            # Create directories
            mkdir -p logs/nginx recordings

            # Deploy
            COMPOSE_FILE="${{ steps.env.outputs.compose_file }}"
            echo "🚀 Deploying with $COMPOSE_FILE..."
            docker compose -f $COMPOSE_FILE down
            docker compose -f $COMPOSE_FILE up -d
            docker image prune -f
            echo "✅ Deployment complete"

            # Health checks
            echo "⏳ Waiting for services..."
            sleep 15

            echo "🏥 Health checks..."
            HEALTH_CHECK_FAILED=0
            if curl -f http://localhost:8000/health >/dev/null 2>&1; then
              echo "✅ Agent is healthy"
            else
              echo "❌ Health check failed"
              HEALTH_CHECK_FAILED=1
            fi

            if [ $HEALTH_CHECK_FAILED -eq 1 ]; then
              echo "❌ Rolling back..."
              docker compose -f $COMPOSE_FILE down
              docker tag ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:backup ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.env.outputs.image_tag }} 2>/dev/null || true
              docker compose -f $COMPOSE_FILE up -d
              echo "✅ Rollback completed"
              exit 1
            fi

            echo ""
            echo "📊 Container Status:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ steps.env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: ${{ steps.meta.outputs.backend == 'true' && '✅ Built' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Access URLs:" >> $GITHUB_STEP_SUMMARY
          echo "- 📞 **Talkdesk**: wss://${{ steps.env.outputs.domain }}/talkdesk" >> $GITHUB_STEP_SUMMARY
          echo "- 🏥 **Health Check**: http://${{ steps.env.outputs.vm_host }}:8000/health" >> $GITHUB_STEP_SUMMARY
