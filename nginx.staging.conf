events {
    worker_connections 1024;
}

http {
    # Single backend for staging
    upstream pipecat_backend {
        server pipecat-agent-1:8000;
    }

    # WebSocket upgrade mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # HTTP server (internal/health checks)
    server {
        listen 8000;
        server_name _;

        proxy_connect_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        send_timeout 3600s;

        location /api/ {
            proxy_pass http://pipecat_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            access_log off;
            return 200 "Piemonte Agent STAGING OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            access_log off;
            return 200 "Piemonte Healthcare Voice Agent - STAGING\n";
            add_header Content-Type text/plain;
        }
    }

    # SSL server (port 443) — Talkdesk connects here
    server {
        listen 443 ssl;
        server_name piemonte-staging.francecentral.cloudapp.azure.com;

        ssl_certificate /etc/letsencrypt/live/piemonte-staging.francecentral.cloudapp.azure.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/piemonte-staging.francecentral.cloudapp.azure.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /talkdesk {
            proxy_pass http://pipecat_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        location /health {
            access_log off;
            return 200 "Piemonte Agent STAGING SSL OK\n";
            add_header Content-Type text/plain;
        }
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
